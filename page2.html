<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<style>
body { font-family: Arial; text-align:center; background:#f4f4f4; }
.form-box {
    background:white; padding:20px; margin:50px auto;
    width:300px; border-radius:10px;
}
input, textarea { width:90%; padding:10px; margin:10px 0; }
button { padding:10px 20px; }
</style>
</head>

<body onload="generateCaptcha()">

<div class="form-box">
    <h2>Contact Us</h2>

    <form id="form" action="https://formsubmit.co/support@minsoft.store" method="POST" onsubmit="return checkCaptcha()">
        
        <input type="text" name="name" placeholder="Your Name" required><br>
        <input type="email" name="email" placeholder="Your Email" required><br>
        <textarea name="message" placeholder="Your Message" required></textarea><br>

        <div id="captchaText"></div>
        <input type="text" id="captchaInput" placeholder="Answer CAPTCHA" required><br>

        <!-- optional settings -->
        <input type="hidden" name="_subject" value="New Contact Form Message">
        <input type="hidden" name="_captcha" value="false">

        <button type="submit">Send</button>
    </form>
</div>

<script>
let num1, num2;

function generateCaptcha() {
    num1 = Math.floor(Math.random() * 10);
    num2 = Math.floor(Math.random() * 10);
    document.getElementById("captchaText").innerText =
        "What is " + num1 + " + " + num2 + "?";
}

function checkCaptcha() {
    let answer = document.getElementById("captchaInput").value;

    if (parseInt(answer) !== (num1 + num2)) {
        alert("Wrong CAPTCHA!");
        generateCaptcha();
        return false;
    }
    else {alert("Sent!");}
    return true;
}
</script>

</body>
</html>
